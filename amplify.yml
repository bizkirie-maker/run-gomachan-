# AWS Amplify Hosting — 静的サイト（ビルド不要）
# Amplify コンソール: アプリの「ルートディレクトリ」は空欄または /（index.html があるリポジトリのルート）
# ビルド設定: リポジトリの amplify.yml を使用
version: 1
frontend:
  phases:
    build:
      commands:
        - echo "=== static site deploy ==="
        - pwd
        - ls -la
        - |
          if [ ! -f index.html ] || [ ! -f styles.css ] || [ ! -f game.js ]; then
            echo "ERROR: index.html / styles.css / game.js がこのディレクトリにありません。"
            echo "Amplify の「ルートディレクトリ」がサブフォルダになっていないか確認してください。"
            exit 1
          fi
        - echo "=== files OK ==="
  artifacts:
    baseDirectory: .
    files:
      - "**/*"
