# AWS Amplify Hosting（Gen1）— 静的サイト。ビルドは不要。
# アプリの「ルートディレクトリ」がこのリポジトリのルート（index.html がある場所）になっているか確認してください。
# カスタムヘッダーが必要なら Amplify コンソールから追加するか、後から customHttp.yml を足してください。
version: 1
frontend:
  phases:
    build:
      commands:
        - echo "static site — no compile"
  artifacts:
    baseDirectory: .
    files:
      - "**/*"
